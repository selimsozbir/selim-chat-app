<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selim Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="loginScreen" class="card login-card">
      <h1>Selim Chat</h1>
      <p>Gerçek zamanlı basit mesajlaşma uygulaması</p>

      <label>Kullanıcı adı</label>
      <input id="usernameInput" maxlength="20" placeholder="Mesela: Selim" />

      <label>Oda adı</label>
      <input id="roomInput" maxlength="30" value="genel" />

      <button id="joinBtn">Sohbete Gir</button>
    </section>

    <section id="chatScreen" class="chat hidden">
      <aside class="sidebar">
        <h2>Odadakiler</h2>
        <ul id="usersList"></ul>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h1 id="roomTitle">#genel</h1>
            <p id="typingText"></p>
          </div>
          <button id="leaveBtn">Çık</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="messageForm" class="message-form">
          <input id="messageInput" autocomplete="off" maxlength="500" placeholder="Mesaj yaz..." />
          <button>Gönder</button>
        </form>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
