<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selim Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card">
        <h1>Selim Chat</h1>
        <p>Giriş yap veya yeni hesap oluştur.</p>

        <div class="tabs">
          <button id="loginTab" class="tab active">Giriş</button>
          <button id="registerTab" class="tab">Kayıt Ol</button>
        </div>

        <form id="authForm">
          <input id="usernameInput" type="text" placeholder="Kullanıcı adı" maxlength="30" required />
          <input id="passwordInput" type="password" placeholder="Şifre" minlength="6" required />
          <button id="authButton" type="submit">Giriş Yap</button>
        </form>

        <p id="authError" class="error"></p>
      </div>
    </section>

    <section id="chatScreen" class="chat-screen hidden">
      <aside class="sidebar">
        <div class="profile-box">
          <label class="avatar-wrap" title="Profil fotoğrafı değiştir">
            <img id="avatarImg" class="avatar-img hidden" alt="Avatar" />
            <div id="avatarLetter" class="avatar">?</div>
            <input id="avatarInput" type="file" accept="image/*" hidden />
          </label>

          <div>
            <strong id="currentUsername">Kullanıcı</strong>
            <button id="removeAvatarButton" class="small-button">PP kaldır</button>
            <button id="logoutButton" class="small-button">Çıkış</button>
          </div>
        </div>

        <div class="nav-buttons">
          <button id="roomModeButton" class="nav active">Oda</button>
          <button id="dmModeButton" class="nav">DM</button>
        </div>

        <div id="roomPanel">
          <div class="room-box">
            <label>Oda</label>
            <div class="room-row">
              <input id="roomInput" type="text" value="genel" maxlength="50" />
              <button id="joinRoomButton">Gir</button>
            </div>
          </div>

          <div class="users-box">
            <h3>Online</h3>
            <ul id="usersList"></ul>
          </div>
        </div>

        <div id="friendsPanel" class="hidden">
          <div class="search-box">
            <label>Arkadaş ara</label>
            <div class="room-row">
              <input id="searchInput" type="text" placeholder="Kullanıcı adı" />
              <button id="searchButton">Ara</button>
            </div>
            <div id="searchResults" class="mini-list"></div>
          </div>

          <div class="requests-box">
            <h3>İstekler</h3>
            <div id="requestsList" class="mini-list"></div>
          </div>

          <div class="friends-box">
            <h3>Arkadaşlar</h3>
            <div id="friendsList" class="mini-list"></div>
          </div>

          <div class="blocked-box">
            <h3>Engellenenler</h3>
            <div id="blockedList" class="mini-list"></div>
          </div>
        </div>

        <div class="notifications-box">
          <h3>Bildirimler <span id="notificationBadge"></span></h3>
          <button id="clearNotificationsButton" class="small-button">Bildirimleri temizle</button>
          <div id="notificationsList" class="mini-list"></div>
        </div>
      </aside>

      <main class="chat-main">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle"># genel</h2>
            <span class="encryption-label">Uçtan Uca Şifreleme 🔒</span>
            <span id="statusText">Bağlanıyor...</span>
          </div>
          <button id="enableNotificationsButton" class="small-button">Bildirim aç</button>
        </header>

        <div id="messages" class="messages"></div>
        <div id="typingText" class="typing"></div>

        <form id="messageForm" class="message-form">
          <input id="messageInput" type="text" placeholder="Mesaj yaz..." maxlength="1000" autocomplete="off" />
          <button type="submit">Gönder</button>
        </form>
      </main>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
