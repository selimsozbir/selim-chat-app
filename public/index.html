<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selim Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card">
        <h1>Selim Chat</h1>
        <p>Hesabınla giriş yap veya yeni hesap oluştur.</p>

        <div class="tabs">
          <button id="loginTab" class="tab active">Giriş</button>
          <button id="registerTab" class="tab">Kayıt Ol</button>
        </div>

        <form id="authForm">
          <input id="usernameInput" type="text" placeholder="Kullanıcı adı" maxlength="30" required />
          <input id="passwordInput" type="password" placeholder="Şifre" minlength="6" required />
          <button id="authButton" type="submit">Giriş Yap</button>
        </form>

        <p id="authError" class="error"></p>
      </div>
    </section>

    <section id="chatScreen" class="chat-screen hidden">
      <aside class="sidebar">
        <div class="profile-box">
          <div id="avatarPreview" class="avatar">?</div>
          <div>
            <strong id="currentUsername">Kullanıcı</strong>
            <button id="logoutButton" class="small-button">Çıkış</button>
          </div>
        </div>

        <div class="room-box">
          <label>Oda</label>
          <div class="room-row">
            <input id="roomInput" type="text" value="genel" maxlength="50" />
            <button id="joinRoomButton">Gir</button>
          </div>
        </div>

        <div class="users-box">
          <h3>Online</h3>
          <ul id="usersList"></ul>
        </div>

        <div class="coming-soon">
          <h3>Sonraki özellikler</h3>
          <p>Arkadaş ekleme, DM, profil fotoğrafı ve bildirim sistemi sıradaki aşamada eklenecek.</p>
        </div>
      </aside>

      <main class="chat-main">
        <header class="chat-header">
          <div>
            <h2 id="roomTitle"># genel</h2>
            <span id="statusText">Bağlanıyor...</span>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <div id="typingText" class="typing"></div>

        <form id="messageForm" class="message-form">
          <input id="messageInput" type="text" placeholder="Mesaj yaz..." maxlength="1000" autocomplete="off" />
          <button type="submit">Gönder</button>
        </form>
      </main>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
